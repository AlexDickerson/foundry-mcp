name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  module:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: module

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: module/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./module
          artifact-name: sbom-module.spdx.json
          output-file: ${{ github.workspace }}/sbom-module.spdx.json
          format: spdx-json

      - name: Scan for vulnerabilities
        uses: anchore/scan-action@v3
        id: module-scan
        with:
          sbom: ${{ github.workspace }}/sbom-module.spdx.json
          fail-build: false
          severity-cutoff: high

      - name: Upload vulnerability scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.module-scan.outputs.sarif }}
          category: module-grype

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: module-dist
          path: module/dist/
          retention-days: 7

  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./server
          artifact-name: sbom-server.spdx.json
          output-file: ${{ github.workspace }}/sbom-server.spdx.json
          format: spdx-json

      - name: Scan for vulnerabilities
        uses: anchore/scan-action@v3
        id: server-scan
        with:
          sbom: ${{ github.workspace }}/sbom-server.spdx.json
          fail-build: false
          severity-cutoff: high

      - name: Upload vulnerability scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.server-scan.outputs.sarif }}
          category: server-grype

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 7

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build module
        working-directory: module
        run: npm ci && npm run build

      - name: Install and build server
        working-directory: server
        run: npm ci && npm run build

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
