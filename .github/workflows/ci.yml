name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install module dependencies
        run: npm ci
        working-directory: module

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Audit root dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit module dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
        working-directory: module

      - name: Audit server dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
        working-directory: server

      - name: Lint module
        run: npm run lint
        working-directory: module

      - name: Lint server
        run: npm run lint
        working-directory: server

      - name: Type-check module
        run: npm run type-check
        working-directory: module

      - name: Build server (type-check)
        run: npm run build
        working-directory: server

      - name: Prettier check
        run: npx prettier --check "module/src/**/*.ts" "server/src/**/*.ts"

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install module dependencies
        run: npm ci
        working-directory: module

      - name: Run module tests
        run: npm test
        working-directory: module
