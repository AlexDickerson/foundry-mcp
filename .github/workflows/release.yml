name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      should_release: ${{ steps.check.outputs.SHOULD_RELEASE }}

    steps:
      - uses: actions/checkout@v6

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.VERSION }}" > /dev/null 2>&1; then
            echo "SHOULD_RELEASE=false" >> "$GITHUB_OUTPUT"
          else
            echo "SHOULD_RELEASE=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create server zip
        run: zip -r foundry-mcp-server.zip dist/ package.json package-lock.json

      - name: Upload server zip
        uses: actions/upload-artifact@v7
        with:
          name: foundry-mcp-server
          path: foundry-mcp-server.zip

  release:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download server zip
        uses: actions/download-artifact@v8
        with:
          name: foundry-mcp-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: |
            ## foundry-mcp v${{ needs.check-version.outputs.version }}

            Download `foundry-mcp-server.zip`, extract, then:
            ```bash
            npm ci --production
            node dist/index.js
            ```

            Pair with the [foundry-api-bridge](https://github.com/AlexDickerson/foundry-api-bridge)
            module installed in Foundry VTT. Configure its WebSocket URL to
            point at `ws://<this-host>:8765/foundry`.
          files: |
            foundry-mcp-server.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
