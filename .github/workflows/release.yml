name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      should_release: ${{ steps.check.outputs.SHOULD_RELEASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./module/package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.VERSION }}" > /dev/null 2>&1; then
            echo "SHOULD_RELEASE=false" >> "$GITHUB_OUTPUT"
          else
            echo "SHOULD_RELEASE=true" >> "$GITHUB_OUTPUT"
          fi

  build-module:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    defaults:
      run:
        working-directory: module

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: module/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create module zip
        run: cd dist && zip -r ../../foundry-api-bridge.zip .

      - name: Upload module zip
        uses: actions/upload-artifact@v7
        with:
          name: foundry-api-bridge
          path: foundry-api-bridge.zip

  build-server:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create server zip
        run: zip -r ../foundry-mcp-server.zip dist/ package.json package-lock.json

      - name: Upload server zip
        uses: actions/upload-artifact@v7
        with:
          name: foundry-mcp-server
          path: foundry-mcp-server.zip

  release:
    runs-on: ubuntu-latest
    needs: [check-version, build-module, build-server]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download module zip
        uses: actions/download-artifact@v4
        with:
          name: foundry-api-bridge

      - name: Download server zip
        uses: actions/download-artifact@v4
        with:
          name: foundry-mcp-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: |
            ## Foundry MCP v${{ needs.check-version.outputs.version }}

            ### Foundry Module
            Download `foundry-api-bridge.zip` and extract to `Data/modules/foundry-api-bridge/`.

            ### MCP Server
            Download `foundry-mcp-server.zip`, extract, then:
            ```bash
            npm ci --production
            node dist/index.js
            ```
          files: |
            foundry-api-bridge.zip
            foundry-mcp-server.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
