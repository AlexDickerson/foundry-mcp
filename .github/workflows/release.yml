name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-module:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: module

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: module/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create module zip
        run: cd dist && zip -r ../../foundry-api-bridge.zip .

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: foundry-api-bridge
          path: foundry-api-bridge.zip

  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create server zip
        run: zip -r ../foundry-mcp-server.zip dist/ package.json package-lock.json

      - name: Upload server zip
        uses: actions/upload-artifact@v4
        with:
          name: foundry-mcp-server
          path: foundry-mcp-server.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-module, build-server]
    permissions:
      contents: write

    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download module zip
        uses: actions/download-artifact@v4
        with:
          name: foundry-api-bridge

      - name: Download server zip
        uses: actions/download-artifact@v4
        with:
          name: foundry-mcp-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Foundry MCP v${{ steps.version.outputs.VERSION }}

            ### Foundry Module
            Download `foundry-api-bridge.zip` and extract to `Data/modules/foundry-api-bridge/`.

            ### MCP Server
            Download `foundry-mcp-server.zip`, extract, then:
            ```bash
            npm ci --production
            node dist/index.js
            ```
          files: |
            foundry-api-bridge.zip
            foundry-mcp-server.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
