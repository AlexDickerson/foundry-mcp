name: Fly Deploy

on:
  workflow_run:
    workflows: ['Docker']
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # On workflow_run, only fire when the Docker workflow itself succeeded.
    # workflow_dispatch is unconditional.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: fly-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # GHCR is case-insensitive for discovery but Fly's machine API rejects
        # uppercase in image identifiers. github.repository preserves the
        # owner's original casing, so lowercase it before passing to flyctl.
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
          echo "deploying $IMAGE"
          flyctl deploy --remote-only --image "$IMAGE"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
