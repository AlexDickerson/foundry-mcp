services:
  foundry-dev:
    image: ghcr.io/alexdickerson/foundry-mcp:latest
    container_name: foundry-dev
    ports:
      - '30001:30000' # Foundry VTT (dev)
      - '8766:8765'   # MCP server (dev)
    volumes:
      - ${FOUNDRY_DATA:-/home/alex/foundry-dev-data}:/data
      # Mount dev builds over the baked-in image files
      - ./module/dist:/opt/foundry-api-bridge
      - ./server/dist:/opt/foundry-mcp/dist
      - ./server/node_modules:/opt/foundry-mcp/node_modules
      - ./server/package.json:/opt/foundry-mcp/package.json
    environment:
      - FOUNDRY_USERNAME=${FOUNDRY_USERNAME}
      - FOUNDRY_PASSWORD=${FOUNDRY_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
